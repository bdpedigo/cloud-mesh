# Cloud-mesh configuration
# All cluster and job settings live here.
# Datastack is per-task (set in enqueue.py).

# ── GKE cluster ──────────────────────────────────────────────────────────────
[cluster]
cluster_name = "cloud-mesh"
disk_size_gb = 200
machine_type = "c2d-highmem-16"
network = "default"             # VPC network name or full resource path
num_nodes = 1
project = "my-gcp-project"      # GCP project ID
subnetwork = "default"          # Subnetwork name or full resource path
zone = "us-west1-c"

# ── Kubernetes job ────────────────────────────────────────────────────────────
[job]
docker_image = "your-dockerhub-user/cloud-mesh:v1" # image to run in each pod
lease_seconds = 600                                # how long a task is reserved before retry
logging_level = "INFO"
max_runs = 10                                      # tasks processed per pod before restarting
n_jobs = 1                                         # parallelism inside a single task (1 = no parallel)
num_replicas = 4                                   # number of concurrent pods
output_bucket = "gs://my-bucket/cloud-mesh-output" # where features are written
queue_url = "gs://my-bucket/queues/cloud-mesh"     # task-queue URL (GCS or SQS)
recompute = false                                  # reprocess even if output already exists

# ── Pod resources ────────────────────────────────────────────────────────────
[resources]
cpu_request = "900m"
ephemeral_storage_limit = "16Gi"
ephemeral_storage_request = "4Gi"
memory_limit = "32Gi"
memory_request = "4Gi"
